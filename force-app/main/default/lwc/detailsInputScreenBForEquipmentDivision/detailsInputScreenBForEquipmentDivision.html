<template>
    <div class="slds-box slds-p-around_none slds-m-top_x-small slds-m-bottom_medium slds-m-horizontal_none">
        <!-- <div> -->
        <div class="c-container">
            <lightning-layout  multiple-rows>
                <lightning-layout-item size="3" padding="around-small" >
                    <!-- 検索条件：画面種類 -->
                    <div class="slds-form-element slds-form-element_horizontal">
                        <label class="slds-form-element__label">{screenType_LabelName}</label>
                        <div class="slds-form-element__control">
                            <template if:false={screenType_isDisabled}>
                                <select class="slds-select" 
                                        onchange={screenType_Handler}
                                        required={screenType_isRequired}>
                                    <template for:each={screenType_Options} for:item="option">
                                        <template if:true={option.selected}>
                                            <option key={option.label} class="uiInputSelectOption" value={option.value} selected>{option.label}</option>
                                        </template>
                                        <template if:false={option.selected}>
                                            <option key={option.label} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                        </template>
                                    </template>
                                </select>
                            </template>
                            <template if:true={screenType_isDisabled}>
                                <select class="slds-select" disabled>
                                    <option value=""></option>
                                </select>
                            </template>
                        </div>
                    </div>
                </lightning-layout-item>
                <!-- 検索　ボタン -->
                <lightning-layout-item size="3" padding="around-small">
                    <div>
                        <button class="slds-button slds-align_absolute-center slds-button_brand search-button" 
                        onclick={onSearch} title="Search" >検　索</button>
                    </div>
                </lightning-layout-item>
                <!-- 空白セル -->
                <lightning-layout-item size="6" padding="around-small"></lightning-layout-item>

                <lightning-layout-item size="3" padding="around-small">
                    <!-- 検索条件：変圧器種類 -->
                    <div class="slds-form-element slds-form-element_horizontal">
                        <label class="slds-form-element__label">{transformerType_LabelName}</label>
                        <div class="slds-form-element__control">
                            <template if:false={transformerType_isDisabled}>
                                <select class="slds-select" 
                                        onchange={transformerType_Handler}
                                        required={transformerType_isRequired}>
                                    <template for:each={transformerType_Options} for:item="option">
                                        <template if:true={option.selected}>
                                            <option key={option.label} class="uiInputSelectOption" value={option.value} selected>{option.label}</option>
                                        </template>
                                        <template if:false={option.selected}>
                                            <option key={option.label} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                        </template>
                                    </template>
                                </select>
                            </template>
                            <template if:true={transformerType_isDisabled}>
                                <select class="slds-select" disabled>
                                    <option value=""></option>
                                </select>
                            </template>
                        </div>
                    </div>
                </lightning-layout-item>

                <lightning-layout-item size="3" padding="around-small">
                    <!-- 検索条件：Rシリーズ -->
                    <template if:false={rSeries_isDisabled}>
                    <div class="slds-form-element slds-form-element_horizontal">
                        <label class="slds-form-element__label">{rSeries_LabelName}</label>
                        <div class="slds-form-element__control">
                                <select class="slds-select" 
                                        onchange={rSeries_Handler}
                                        required={rSeries_isRequired}>
                                    <template for:each={rSeries_Options} for:item="option">
                                        <template if:true={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value} selected>{option.label}</option>
                                        </template>
                                        <template if:false={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                        </template>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </template>
                </lightning-layout-item>

                <lightning-layout-item size="3" padding="around-small">
                    <!-- 検索条件：EXｰαシリーズ -->
                    <template if:false={exaSeries_isDisabled}>
                    <div class="slds-form-element slds-form-element_horizontal">
                        <label class="slds-form-element__label">{exaSeries_LabelName}</label>
                        <div class="slds-form-element__control">
                                <select class="slds-select" 
                                        onchange={exaSeries_Handler}
                                        required={exaSeries_isRequired}>
                                    <option value=""></option>
                                    <template for:each={exaSeries_Options} for:item="option">
                                        <template if:true={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value} selected>{option.label}</option>
                                        </template>
                                        <template if:false={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                        </template>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </template>
                </lightning-layout-item>

                <lightning-layout-item size="3" padding="around-small">
                    <!-- 検索条件：EXｰβシリーズ -->
                    <template if:false={exbSeries_isDisabled}>
                        <div class="slds-form-element slds-form-element_horizontal">
                        <label class="slds-form-element__label">{exbSeries_LabelName}</label>
                            <div class="slds-form-element__control">
                                <select class="slds-select" 
                                        onchange={exbSeries_Handler}
                                        required={exbSeries_isRequired}>
                                    <option value=""></option>
                                    <template for:each={exbSeries_Options} for:item="option">
                                        <template if:true={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value} selected>{option.label}</option>
                                        </template>
                                        <template if:false={option.selected}>
                                            <option key={option.order} data-id={option.order} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                        </template>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </template>
                </lightning-layout-item>

            </lightning-layout>
        </div>

        <!-- 選択された仕様 -->
        <div  class="c-container">
            <lightning-layout>
            <lightning-layout-item padding="around-small">
                <div class="header-column">
                    <p> 
                        <b>選択仕様：{displayCondition}</b>
                    </p>
                    <p>
                        <b>価格合計：<lightning-formatted-number value={displayTotal}></lightning-formatted-number></b>
                    </p>
                </div>
            </lightning-layout-item>
            </lightning-layout>
        </div>

        <!-- 高圧TR2 高低圧TR2-->
        <lightning-layout>
            <!-- <div class="slds-m-around_medium"> -->
            <template if:true={title}>
                <lightning-accordion allow-multiple-sections-open  active-section-name={title}>
                    <lightning-accordion-section name={title} label={title}>
                    <template if:true={isNodata}>
                        <div class="slds-align_absolute-center">
                            <br />
                            指定条件により、明細データ取得できません。
                        </div>
                    </template>
                    <template if:false={isNodata}>
                    <template if:true={bodyList}>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered slds-no-row-hover">
                            <!-- 一覧　ヘッダー -->   
                                <thead>
                                    <template iterator:row={headerList}>
                                        <tr key={row.value.cellList} class="slds-line-height_reset">
                                            <template iterator:cell={row.value.cellList}>
                                                <template if:true={cell.value.isRowSpan}>
                                                    <th key={cell.value.value} rowspan={cell.value.rowSpanCnt} scope="col" class="slds-is-resizable slds-text-align_center slds-text-title" >
                                                        <span class="slds-truncate" title={cell.value.value}>{cell.value.value}</span>
                                                    </th>
    
                                                </template>
                                                <template if:true={cell.value.isColSpan}>
                                                    <th key={cell.value.value} colspan={cell.value.colSpanCnt} scope="col" class="slds-is-resizable slds-text-align_center slds-text-title" >
                                                        <span class="slds-truncate" title={cell.value.value}>{cell.value.value}</span>
                                                    </th>
                                                </template>
                                                <template if:false={cell.value.isRowSpan}>
                                                    <template if:false={cell.value.isColSpan}>
                                                        <th key={cell.value.value} scope="col" class="slds-is-resizable slds-text-align_center slds-text-title" >
                                                            <span class="slds-truncate" title={cell.value.value}>{cell.value.value}</span>
                                                        </th>
                                                    </template>
                                                </template>
                                            </template>
                                        </tr>
                                    </template>
                                </thead>
                                <!-- 一覧 ボディー情報-->
                                <tbody>
                                    <template iterator:row={bodyList}>
                                        <tr key={row.value.cellList} class="slds-hint-parent">
                                            <template iterator:cell={row.value.cellList}>
                                                <template if:false={cell.value.isEdit}>
                                                    <template if:true={cell.value.isColSpan}>
                                                        <td key={cell.value.value} colspan={cell.value.colSpanCnt}>
                                                            <template if:true={cell.value.isRight}>
                                                                <div class="slds-truncate slds-text-align_right"><lightning-formatted-text value={cell.value.value}></lightning-formatted-text></div>
                                                            </template>
                                                            <template if:false={cell.value.isRight}>
                                                                <div class="slds-truncate slds-text-align_left"><lightning-formatted-text value={cell.value.value}></lightning-formatted-text></div>
                                                            </template>
                                                        </td>
                                                    </template>
                                                    <template if:false={cell.value.isColSpan}>
                                                        <td key={cell.value.value}>
                                                            <template if:true={cell.value.isRight}>
                                                                <div class="slds-truncate slds-text-align_right"><lightning-formatted-text value={cell.value.value}></lightning-formatted-text></div>
                                                            </template>
                                                            <template if:false={cell.value.isRight}>
                                                                <div class="slds-truncate slds-text-align_left"><lightning-formatted-text value={cell.value.value}></lightning-formatted-text></div>
                                                            </template>
                                                        </td>
                                                    </template>
    
                                                </template>
                                                <template if:true={cell.value.isEdit}>
                                                    <td key={cell.value.value} style="border-right:thick double rgb(229, 229, 229);">
                                                        <div class="slds-truncate slds-text-align_center">
                                                            <lightning-input type="checkbox" 
                                                            data-id={cell.value.value.Id} 
                                                            data-name={cell.value.value.Price__c}
                                                            data-title={cell.value.value.Name1__c}
                                                            variant="label-hidden" 
                                                            onchange={handleScreenInputChange}  checked={cell.value.value.isChecked} ></lightning-input>
                                                            
                                                        </div>
                                                    </td>
                                                </template>
                                            </template>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </template>
                    </template>
                    </lightning-accordion-section>
                </lightning-accordion>
            <!-- </div> -->
            </template>
        </lightning-layout>

        <!-- 高圧TR2　Opt -->
        <template if:true={isHighVoltage}>
            <!-- Rシリーズ　単相-->
            <lightning-layout>
                <template if:true={rSeriesSingleTable}>
                <c-common-table data-id="rSeriesSingleTable"
                    table-obj={rSeriesSingleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
            <!-- Rシリーズ　三相-->
            <lightning-layout>
                <template if:true={rSeriesTriangleTable}>
                <c-common-table data-id="rSeriesTriangleTable"
                    table-obj={rSeriesTriangleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
            <!-- EX-αシリーズ　単相-->
            <lightning-layout>
                <template if:true={exaSeriesSingleTable}>
                <c-common-table data-id="exaSeriesSingleTable"
                    table-obj={exaSeriesSingleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
            <!-- EX-αシリーズ　三相-->
            <lightning-layout>
                <template if:true={exaSeriesTriangleTable}>
                <c-common-table data-id="exaSeriesTriangleTable"
                    table-obj={exaSeriesTriangleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
            <template if:true={isOil} >
                <!-- EX-βシリーズ　単相-->
                <lightning-layout>
                    <template if:true={exbSeriesSingleTable}>
                    <c-common-table data-id="exbSeriesSingleTable"
                        table-obj={exbSeriesSingleTable}
                        oncommontableinputchange={onCommonTableInputChange}>
                    </c-common-table>
                </template>
                </lightning-layout>
                <!-- EX-βシリーズ　三相-->
                <lightning-layout>
                    <template if:true={exbSeriesTriangleTable}>
                    <c-common-table data-id="exbSeriesTriangleTable"
                        table-obj={exbSeriesTriangleTable}
                        oncommontableinputchange={onCommonTableInputChange}>
                    </c-common-table>
                </template>
                </lightning-layout>
    
            </template>
        </template>
        <!-- 高低圧TR2　Opt -->
        <template if:true={isLowVoltage} >
            <!-- 付属品-->
            <lightning-layout>
                <template if:true={lowVoltageTable}>
                <c-common-table data-id="lowVoltageTable"
                    table-obj={lowVoltageTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
        </template>
        <!-- H種乾式変圧器　Opt -->
        <template if:true={isHDry} >
            <!-- H種乾式 単相-->
            <lightning-layout>
                <template if:true={hDrySingleTable}>
                <c-common-table data-id="hDrySingleTable"
                    table-obj={hDrySingleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
            <!-- H種乾式 三相-->
            <lightning-layout>
                <template if:true={hDryTriangleTable}>
                <c-common-table data-id="hDryTriangleTable"
                    table-obj={hDryTriangleTable}
                    oncommontableinputchange={onCommonTableInputChange}>
                </c-common-table>
            </template>
            </lightning-layout>
        </template>
        <div  class="c-container">
            <lightning-layout>
            <lightning-layout-item padding="around-small">
                <div class="header-column">
                    <p>
                        <b>価格合計：<lightning-formatted-number value={displayTotal}></lightning-formatted-number></b>
                    </p>
                </div>
            </lightning-layout-item>
            </lightning-layout>
        </div>
    </div>
    <template if:true={loader}>
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </template>
</template>
