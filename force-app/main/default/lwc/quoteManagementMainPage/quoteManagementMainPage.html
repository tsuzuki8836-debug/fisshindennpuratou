<template>
    <!-- lightning button for open modal window -->
    <lightning-button variant="brand"
       label="明細入力A"
       title="ItemsInput"
       onclick={openModal}
       class="slds-m-left_x-small">
    </lightning-button>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" 
        class="slds-modal slds-modal_large slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="close"
                            variant="inverse"
                            size="small" ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-text-heading_large slds-hyphenate">明細入力A</h2>
                </header>
                <div class="slds-modal__content slds-p-around_large first-section" id="modal-content-id-1">
                    <c-filter-condition-pattern-a record-id={recordId}
                            onmetachange={onMetaChange}
                    ></c-filter-condition-pattern-a>
                    <c-search-datatable record-id={recordId} data-id="searchDatatable"
                    onquantitychange={onQuantityChange}
                    onexpensechange={onExpenseChange}
                    onnewrowchange={onNewRowChange}
                    onclearall={onClearAll}
                    ></c-search-datatable>
                </div>
                <footer class="slds-modal__footer">
                    <div class="slds-grid slds-grid_align-center">
                        <button class="slds-button slds-button_neutral" onclick={closeModal} title="Cancel">キャンセル</button>
                        <button class="slds-button slds-button_brand" onclick={submitDetailsForA} title="Save" data-id="SaveA">保存</button>
                        <button class="slds-button slds-button_brand" onclick={submitDetailsForA} title="Save" data-id="SaveToDevice">保存＆見積項目一覧へ</button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <lightning-button variant="brand"
       label="明細入力B"
       title="ItemsInput"
       onclick={openModalB}
       class="slds-m-left_x-small">
    </lightning-button>

    <template if:true={isAddModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" 
        class="slds-modal slds-modal_large slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeAddModal}>
                        <lightning-icon icon-name="utility:close"
                            alternative-text="close"
                            variant="inverse"
                            size="small" ></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-04" class="slds-text-heading_large slds-hyphenate">明細追加</h2>
                </header>
                <div class="slds-modal__content slds-p-around_large first-section" id="modal-content-id-4">
                    <c-details-add-screen
                            data-id="detailsAddScreen"
                            record-id={recordId}
                            onquantitychange={onQuantityChange}
                            oncheckboxchange={onCheckBoxChange}
                    >
                    </c-details-add-screen>
                </div>
                <footer class="slds-modal__footer">
                    <div class="slds-grid slds-grid_align-center">
                        <button class="slds-button slds-button_neutral" onclick={closeAddModal} title="Cancel">キャンセル</button>
                        <!-- onclick={submitDetailsForA} -->
                        <button class="slds-button slds-button_brand" title="Save" onclick={submitDetailsForAddModal} data-id="SaveAddModal">保存</button>
                        <button class="slds-button slds-button_brand" title="Save" onclick={submitDetailsForAddModal} data-id="SaveAddModalToDevice">保存＆見積項目一覧へ</button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
