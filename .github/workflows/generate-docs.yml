name: Automatic Architecture Document Generation

on: [push]

# クラウドのランナー全体に対してNode.js 24環境でのJavaScriptアクション実行を強制し、
# 非推奨（deprecation）エラーおよび今後の自動強制シャットダウンを根本から回避するグローバルガードレール
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          node-version: '18'
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pillow

      - name: Run Document Generator Pipeline
        run: |
          cd scripts/doc_generator
          python generate_docs.py

      - name: Upload Excel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Salesforce-Flow-Design-Specifications
          path: scripts/doc_generator/*.xlsx