name: Automatic Architecture Document Generation

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'scripts/doc_generator/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ★根本解決: クラウドのLinuxサーバー環境に日本語フォント（Noto CJK）を自動インストールするガードレール
      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install mermaid-cli Globally
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pillow

      - name: Run Document Generator Pipeline
        run: |
          cd scripts/doc_generator
          python generate_docs.py

      - name: Upload Excel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Salesforce-Flow-Design-Specifications
          path: scripts/doc_generator/*.xlsx