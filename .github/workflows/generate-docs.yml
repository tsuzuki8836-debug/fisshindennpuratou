name: Automatic Architecture Document Generation

on:
  push:
    # main または master ブランチへのプッシュ時のみに制限
    branches:
      - main
      - master
    # ★重要: scripts/doc_generator/ フォルダ内のファイルが変更された時だけActionsを起動するガードレール
    paths:
      - 'scripts/doc_generator/**'

# クラウドのランナー全体に対してNode.js 24環境でのJavaScriptアクション実行を強制
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install mermaid-cli Globally
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pillow

      - name: Run Document Generator Pipeline
        run: |
          cd scripts/doc_generator
          python generate_docs.py

      - name: Upload Excel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Salesforce-Flow-Design-Specifications
          path: scripts/doc_generator/*.xlsx